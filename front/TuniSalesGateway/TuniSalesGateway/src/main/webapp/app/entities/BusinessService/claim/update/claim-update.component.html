<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-6">

      <div class="d-flex align-items-center mb-4">
        <button type="button" class="btn btn-outline-secondary me-3" (click)="previousState()">
          <fa-icon icon="arrow-left"></fa-icon>
        </button>
        <h2 class="mb-0">Nouvelle réclamation / demande de récupération</h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <fa-icon icon="exclamation-triangle" class="me-2"></fa-icon>
            <strong>Détails</strong>
          </div>
          <div class="card-body">

            <div class="mb-3">
              <label class="form-label fw-semibold" for="field_type">
                Type <span class="text-danger">*</span>
              </label>
              <select class="form-select" id="field_type" formControlName="type">
                <option [ngValue]="null">-- Sélectionner un type --</option>
                <option *ngFor="let t of claimTypeValues" [value]="t">{{ typeLabel(t) }}</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="field_subject">
                Sujet <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="field_subject" formControlName="subject" maxlength="200" placeholder="Ex: Téléphone défectueux livré au point de vente" />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="field_description">Description</label>
              <textarea class="form-control" id="field_description" formControlName="description" rows="4" maxlength="1000" placeholder="Détaillez la réclamation ou la demande de récupération..."></textarea>
            </div>

          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-outline-secondary" (click)="previousState()" [disabled]="isSaving">
            <fa-icon icon="ban"></fa-icon> Annuler
          </button>
          <button type="submit" class="btn btn-primary px-4" [disabled]="editForm.invalid || isSaving">
            <fa-icon *ngIf="!isSaving" icon="save"></fa-icon>
            <fa-icon *ngIf="isSaving" icon="spinner" [spin]="true"></fa-icon>
            {{ isSaving ? 'Envoi...' : 'Déposer' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
