<div class="met-page">

  <!-- ── Header ── -->
  <div class="met-header">
    <div class="met-header__left">
      <div class="met-header__icon">
        <fa-icon icon="tachometer-alt"></fa-icon>
      </div>
      <div>
        <h2 id="metrics-page-heading" data-cy="metricsPageHeading" class="met-header__title">Métriques de l'application</h2>
        <p class="met-header__subtitle">Mémoire, threads, système et performances en temps réel</p>
      </div>
    </div>
    <button class="met-btn" (click)="refresh()">
      <fa-icon icon="sync"></fa-icon>
      <span>Rafraîchir</span>
    </button>
  </div>

  <div class="met-loading" *ngIf="updatingMetrics">
    <fa-icon icon="spinner" [spin]="true"></fa-icon>
    Mise à jour...
  </div>

  <h3 class="met-section-title">Métriques de la JVM</h3>

  <div class="met-grid" *ngIf="metrics && !updatingMetrics">
    <jhi-jvm-memory [updating]="updatingMetrics" [jvmMemoryMetrics]="metrics.jvm"></jhi-jvm-memory>
    <jhi-jvm-threads [threads]="threads"></jhi-jvm-threads>
    <jhi-metrics-system [updating]="updatingMetrics" [systemMetrics]="metrics.processMetrics"></jhi-metrics-system>
  </div>

  <jhi-metrics-garbagecollector
    *ngIf="metrics && metricsKeyExists('garbageCollector')"
    [updating]="updatingMetrics"
    [garbageCollectorMetrics]="metrics.garbageCollector"
  ></jhi-metrics-garbagecollector>

  <jhi-metrics-request
    *ngIf="metrics && metricsKeyExists('http.server.requests')"
    [updating]="updatingMetrics"
    [requestMetrics]="metrics['http.server.requests']"
  ></jhi-metrics-request>

  <jhi-metrics-endpoints-requests
    *ngIf="metrics && metricsKeyExists('services')"
    [updating]="updatingMetrics"
    [endpointsRequestsMetrics]="metrics.services"
  ></jhi-metrics-endpoints-requests>

  <jhi-metrics-cache
    *ngIf="metrics && metricsKeyExists('cache')"
    [updating]="updatingMetrics"
    [cacheMetrics]="metrics.cache"
  ></jhi-metrics-cache>

  <jhi-metrics-datasource
    *ngIf="metrics && metricsKeyExistsAndObjectNotEmpty('databases')"
    [updating]="updatingMetrics"
    [datasourceMetrics]="metrics.databases"
  ></jhi-metrics-datasource>
</div>
